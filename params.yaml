# params.yaml — all tunable values live here, NOT hardcoded in scripts
# DVC reads this file to detect when parameters change and re-runs stages

data:
  raw_dir: data/raw
  processed_dir: data/processed
  test_size: 0.2           # 80% train, 20% test
  random_state: 42         # Fixed seed → reproducible train/test split

preprocessing:
  nan_threshold: 0.5       # Drop columns where >50% values are NaN
  smote_random_state: 42

train:
  random_state: 42
  n_jobs: -1               # Use all CPU cores

  random_forest:
    n_estimators: 100
    max_depth: 20
    min_samples_split: 5

  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8

  lightgbm:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    num_leaves: 63
