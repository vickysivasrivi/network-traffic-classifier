name: CI — Test and Docker Build

# =============================================================================
# Runs on every push and pull request to any branch.
# Two jobs run sequentially:
#   1. test        — install deps, run preprocessing unit tests (no model artifacts needed)
#   2. docker-build — validate the Dockerfile builds cleanly (depends on test passing)
# =============================================================================

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests
  #
  # Only tests/test_preprocess.py runs here — it uses synthetic NumPy/pandas
  # data and has zero dependency on model artifacts (models/, data/processed/).
  #
  # tests/test_api.py is excluded because it calls Predictor() at collection
  # time, which tries to load models/best_model.joblib (3.1 MB). That file is
  # NOT stored in Git (it is managed by DVC / S3). Pulling model artifacts in
  # CI is a Week 5+ concern.
  # ---------------------------------------------------------------------------
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install all dependencies
        run: pip install -r requirements.txt

      - name: Run preprocessing unit tests
        run: pytest tests/test_preprocess.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: Validate Dockerfile
  #
  # Builds the Docker image end-to-end to confirm:
  #   - requirements-api.txt is valid and all packages install correctly
  #   - All targeted COPY artifacts exist (api/, models/, data/processed/, metrics.json)
  #   - The final CMD syntax is correct
  #
  # This job will catch a broken Dockerfile on every push, not just at deploy time.
  # depends on `test` so we don't waste build minutes on a failing codebase.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t network-threat-classifier:ci .
