global:
  scrape_interval: 15s      # Scrape every 15 seconds
  evaluation_interval: 15s  # Evaluate alerting rules every 15 seconds

# Load alerting rules from the mounted rules file.
rule_files:
  - /etc/prometheus/rules.yml

# Send firing alerts to Alertmanager (optional — comment out if not running alertmanager).
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: network-threat-api
    static_configs:
      - targets: ["api:8000"]   # "api" resolves via docker-compose service name
    metrics_path: /prometheus   # Our custom endpoint (avoids /metrics conflict)
